name: Publish

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$PACKAGE_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Create GitHub release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$VERSION" '
            $0 == "## " version { found = 1; print; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog entry found for $VERSION" >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md

      - name: Publish to npm
        run: npm publish --access public
